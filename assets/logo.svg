  <circle cx="300" cy="300" r="223" fill="#ffffff"/>
  <circle cx="300" cy="300" r="218" fill="none" stroke="#2b2187" stroke-width="8"/>
  <circle cx="300" cy="300" r="141" fill="url(#purple)"/>

  <text font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="700" fill="url(#gold)" letter-spacing="8">
    <textPath href="#topText" startOffset="50%" text-anchor="middle">BRUVSCHESS</textPath>
  </text>
  <text font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700" fill="url(#gold)" letter-spacing="7">
    <textPath href="#bottomText" startOffset="50%" text-anchor="middle">EDUCATIONAL SERVICES</textPath>
  </text>

  <text x="112" y="304" text-anchor="middle" dominant-baseline="middle" font-size="43" fill="#2b2187">★</text>
  <text x="488" y="304" text-anchor="middle" dominant-baseline="middle" font-size="43" fill="#2b2187">★</text>

  <path
    fill="#ffffff"
