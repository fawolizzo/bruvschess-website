<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" aria-labelledby="title desc">
  <title id="title">BruvsChess Educational Services logo</title>
  <desc id="desc">A circular purple and gold chess education logo with a knight emblem.</desc>
  <defs>
    <path id="topText" d="M 155 272 A 150 150 0 0 1 445 272"/>
    <path id="bottomText" d="M 455 328 A 160 160 0 0 1 145 328"/>
    <linearGradient id="purple" x1="160" y1="150" x2="440" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#342594"/>
      <stop offset="1" stop-color="#21156f"/>
    </linearGradient>
    <linearGradient id="gold" x1="150" y1="140" x2="450" y2="460" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d9bd76"/>
      <stop offset="0.5" stop-color="#b58b3d"/>
      <stop offset="1" stop-color="#e1c984"/>
